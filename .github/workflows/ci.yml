# Runs in the Aquatech front Git repository root (separate repo from the API).
# Azure Static Web Apps workflow still handles SWA deploy; this adds lint + local build on every PR.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: npm audit (critical or higher)
        continue-on-error: true
        run: npm audit --audit-level=critical
