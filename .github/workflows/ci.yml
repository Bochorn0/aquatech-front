# Runs in the Aquatech front Git repository root (separate repo from the API).
# Only on pull_request: pushes to main already run "Azure Static Web Apps CI/CD" (build + deploy).
# This workflow adds ESLint + a plain npm build on PRs without duplicating that second run on main.

name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: npm audit (critical or higher)
        continue-on-error: true
        run: npm audit --audit-level=critical
