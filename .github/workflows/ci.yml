# PR checks: secrets, SAST (Semgrep), lint/build, dependency audit (FEMSA 40 / 50 / 7).
# Pushes to main still use Azure Static Web Apps only (no duplicate runs).

name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/javascript
            p/typescript
            p/react

  lint-and-build:
    name: Lint, build & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: ESLint
        run: yarn lint

      - name: Production build
        run: yarn build

      # Yarn v1 exit codes: 4=low, 8=moderate, 12=high, 16=critical (not filtered by --level)
      - name: Dependency audit (critical or higher)
        run: |
          yarn audit --level critical || code=$?
          code=${code:-0}
          if [ "$code" -eq 16 ]; then
            echo "::error::Critical vulnerabilities found (yarn audit)"
            exit 1
          fi
          if [ "$code" -ne 0 ] && [ "$code" -ne 4 ] && [ "$code" -ne 8 ] && [ "$code" -ne 12 ]; then
            echo "::error::yarn audit failed with exit code $code"
            exit 1
          fi
          echo "No critical vulnerabilities (yarn audit exit $code)"
