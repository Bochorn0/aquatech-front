# DAST evidence (FEMSA control 50). Optional until ZAP_TARGET_URL is configured.
#
# Setup: Repository → Settings → Secrets → Actions → ZAP_TARGET_URL
#   Example: https://your-staging-app.azurestaticapps.net
#
# Also set repository variable ENABLE_ZAP_BASELINE = true to run on schedule.

name: DAST (OWASP ZAP Baseline)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Base URL to scan (overrides secret for this run)
        required: false
  schedule:
    - cron: '0 15 * * 1'

permissions:
  contents: read

jobs:
  zap-baseline:
    name: ZAP Baseline
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_ZAP_BASELINE == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Resolve target URL
        id: target
        env:
          INPUT_URL: ${{ github.event.inputs.target_url }}
          SECRET_URL: ${{ secrets.ZAP_TARGET_URL }}
        run: |
          url="${INPUT_URL:-$SECRET_URL}"
          if [ -z "$url" ]; then
            echo "::error::Set ZAP_TARGET_URL secret or pass target_url when running manually."
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: ZAP Baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ steps.target.outputs.url }}
          allow_issue_writing: false
